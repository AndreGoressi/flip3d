name: CMake on a single platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Ermöglicht dir das manuelle Starten per Knopfdruck!

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Fertige Anwendung hochladen
      uses: actions/upload-artifact@v4
      with:
        name: Flip3D-Windows-Anwendung
        path: ${{github.workspace}}/build/Release/flip3d.exe
